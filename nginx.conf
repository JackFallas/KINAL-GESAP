server {
    listen 80;
    server_name kinal.gesap.lat;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kinal.gesap.lat;

    ssl_certificate     /etc/ssl/kinal.gesap.lat/fullchain.pem;
    ssl_certificate_key /etc/ssl/kinal.gesap.lat/privkey.pem;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 6M;
    }

    # Archivos subidos (documentos médicos)
    location /uploads/ {
        alias /var/www/gesap-kinal/uploads/;
        add_header X-Content-Type-Options nosniff;
        add_header Content-Disposition "attachment";
    }

    # Portal administrativo — /admin
    location /admin {
        alias /var/www/gesap-kinal/client-admin/;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache" always;
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Portal de enfermería — /enfermero
    location /enfermero {
        alias /var/www/gesap-kinal/client-enfermero/;
        try_files $uri $uri/ /enfermero/index.html;
        add_header Cache-Control "no-cache" always;
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Portal estudiantil — raíz
    location / {
        root /var/www/gesap-kinal/client-alumno/;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
